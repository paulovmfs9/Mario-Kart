<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
<style>body { margin:0; background:#222; }</style>
</head>
<body>

<script>
const config = {
  type: Phaser.AUTO,
  width: 400,
  height: 600,
  scene: { create, update }
};

let player;
let curve = 0;
let curveDirection = 1;
let roadLines = [];

const game = new Phaser.Game(config);

function create() {
  this.add.rectangle(200, 300, 400, 600, 0x6ecb3c); // grama

  this.road = this.add.graphics();

  // linhas centrais
  for (let i = 0; i < 30; i++) {
    let line = this.add.rectangle(200, i * 20, 4, 10, 0xffffff);
    roadLines.push(line);
  }

  player = this.add.rectangle(200, 520, 50, 80, 0xff0000);
}

function update() {
  this.road.clear();

  // muda curva automaticamente
  curve += 0.02 * curveDirection;

  if (curve > 1 || curve < -1) {
    curveDirection *= -1;
  }

  for (let i = 0; i < 30; i++) {
    let scale = i / 30;

    let width = 100 + scale * 250;

    // DESLOCAMENTO DA CURVA
    let offset = curve * Math.pow(scale, 2) * 200;

    this.road.fillStyle(0x333333);
    this.road.fillRect(
      200 - width / 2 + offset,
      i * 20,
      width,
      20
    );
  }

  // linhas centrais acompanhando curva
  roadLines.forEach((line, i) => {
    let scale = i / 30;
    let offset = curve * Math.pow(scale, 2) * 200;

    line.y += 5;
    line.x = 200 + offset;
    line.width = 4 + scale * 10;

    if (line.y > 600) {
      line.y = 0;
    }
  });
}
</script>

</body>
</html>
